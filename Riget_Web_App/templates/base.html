<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/styles.css') }}">
</head>
<body>
    <header>
        <nav>
            <div>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about_page') }}">About us</a>
                <a href="{{ url_for('educational_page') }}">Educational</a>
                <a href="{{ url_for('booking_page') }}">Booking</a>
            </div>

            <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo">
            
            <div>
                <img  src="{{ url_for('static', filename='image/search.png') }}" alt="Search">
                <img  src="{{ url_for('static', filename='image/user.png') }}" alt="Account">
                <img  src="{{ url_for('static', filename='image/menu.png') }}" alt="Menu">
            </div>
        </nav>
    </header>
    <main>
        {% block content %}
        
        {% endblock %}
    </main>
    <footer>

    </footer>
    
</body>
</html>
